<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Gaming website</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <style type="text/css">
        #popup {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0, 0, 0, 0.7);
          z-index: 999;
        }
        
        #popup-image {
          display: block;
          position: relative;
          margin: 10% auto;
          max-width: 80%;
          max-height: 80%;
          bottom: 12%;

        }
        
        button {
          margin-top: 20px;
        }

        #main-header{
            position: relative;
            color: #f6f2f2;
            text-align: center;
        }
        
    </style>
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

<link rel="stylesheet" type="text/css" href="style.css">
    
</head>

<body>

    <header id="main-header">
        <h1 style="font-family:fantasy" text-align="center" >Game Zone</h2>
    </header>
    
		<div class="block">
			<a href="#"><img src="hc.jpg"  class="image" ></a>
            <div class="middle">
                <button type="button" onclick="showImage('hc.jpg')" style="text-decoration: none;" class= "button"> Rules </button>
                <br><br>
                <a style="text-decoration: none;" class= "button" href="Hand-Cricket/index.html">Play Now</a>
              </div>
			<h2 style="color: #f6f2f2;">Hand Cricket</h2>
		</div>
		<div class="block">
			<a href="#"><img src="wordle.png" class="image" ></a>
            <div class="middle">
                <button type="button" onclick="showImage('WR.jpg')" style="text-decoration: none;" class= "button"> Rules </button>
                <br><br>
                <a style="text-decoration: none;" class= "button" href="wordle-speedrun/index.html">Play Now</a>
              </div>
			<h2 style="color: #f6f2f2;">Wordle</h2>
		</div>
		<div class="block">
			<a href="#"><img src="tic tac toe.jpg" class="image"></a>
            <div class="middle">
                <button type="button" onclick="showImage('TTTR.jpg')" style="text-decoration: none;" class= "button"> Rules </button>
                <br><br>
                <a style="text-decoration: none;" class= "button" href="Tic-Tac-Toe Game/index.html">Play Now</a>
              </div>
			<h2 style="color: #f6f2f2;">Tic Tac Toe </h2>
		</div>
		<div class="block">
			<a href="#"><img src="memorycard.jpg" class="image"></a>
            <div class="middle">
                <button type="button" onclick="showImage('MCR.jpg')" style="text-decoration: none;" class= "button"> Rules </button>
                <br><br>
                <a style="text-decoration: none;" class= "button" href="Memory Card Game/mainGame.html">Play Now</a>
              </div>
			<h2 style="color: #f6f2f2;">Memory Card</h2>
		</div>
    

        <div id="popup">
            <img id="popup-image" src="" alt="Pop-up Image">
          </div>
        <script>
            function showImage(imagePath) {
              var popup = document.getElementById("popup");
              var popupImage = document.getElementById("popup-image");
              popup.style.display = "block";
              popupImage.src = imagePath;
            }
        
            document.addEventListener("DOMContentLoaded", function() {
              var popup = document.getElementById("popup");
              popup.addEventListener("click", function() {
                this.style.display = "none";
              });
            });
          </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>

</body>
</html>
